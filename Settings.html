<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google-adsense-account" content="ca-pub-5610467918289293">
<title>Venux - Settings</title>

<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ayytrix/ventest1/refs/heads/main/venux.png">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5610467918289293"
crossorigin="anonymous"></script>

<style>
body {
  margin: 0;
  font-family: Arial,sans-serif;
  background: #d4d4d4;
  color: #222;
  font-size: 13px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
#main-header {
  background: linear-gradient(to bottom,#1a4a84 0%,#0b2c5a 100%);
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#main-header img { height:52px; object-fit:contain; }

.auth-buttons { display:flex; align-items:center; gap:10px; color:white; }

.logout-btn {
  padding:8px 15px;
  border:none;
  border-radius:4px;
  font-weight:bold;
  cursor:pointer;
  font-size:12px;
  background:linear-gradient(to bottom,#f44336 0%,#da190b 100%);
  color:white;
}

/* NAV */
#sub-header {
  background: linear-gradient(to bottom,#1a4a84 0%,#0b2c5a 100%);
  padding: 8px 15px;
  border-bottom: 1px solid #000;
}
#sub-header a {
  margin-right:10px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  padding:6px 10px;
  border-radius:4px;
}
#sub-header a:hover {
  background:linear-gradient(to bottom,#1f5da0 0%,#0e3670 100%);
}

/* NOTICE */
#notice {
  background: linear-gradient(to bottom,#ffa200 0%,#cc7a00 100%);
  color:white;
  padding:10px 20px;
  font-weight:bold;
  text-align:center;
  border-bottom:2px solid #a85f00;
}

/* CONTENT */
#page-content {
  padding:20px;
  display:flex;
  justify-content:center;
}

.settings-box {
  width:600px;
  background: linear-gradient(to bottom,#fff 0%,#e2e2e2 100%);
  border:2px solid #999;
  box-shadow:2px 2px 0 #aaa;
  padding:15px;
}

.setting-title {
  font-size:18px;
  font-weight:bold;
  margin-bottom:15px;
}

.setting-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-top:1px solid #ccc;
}

.button {
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
  color:white;
}

.normal-btn {
  background:#28a745;
}

.dark-btn {
  background:#444;
}

/* FOOTER */
#footer {
  text-align:center;
  font-size:12px;
  color:#444;
  padding:10px;
  border-top:2px solid #999;
  background:linear-gradient(to bottom,#f3f3f3 0%,#d8d8d8 100%);
  margin-top:auto;
}

/* =========================
   OBC DARK THEME (2011 STYLE)
========================= */

body.dark-mode {
  background: linear-gradient(to bottom,#5a5a5a 0%,#2e2e2e 50%,#151515 100%);
  color: #fff;
}

body.dark-mode #main-header,
body.dark-mode #sub-header {
  background: linear-gradient(to bottom,#666 0%,#333 50%,#111 100%);
}

body.dark-mode #notice {
  background: linear-gradient(to bottom,#666 0%,#333 100%);
  border-bottom:2px solid #111;
}

body.dark-mode .settings-box {
  background: linear-gradient(to bottom,#555 0%,#333 100%);
  border:2px solid #111;
  color:white;
  box-shadow:2px 2px 0 #000;
}

body.dark-mode #footer {
  background: linear-gradient(to bottom,#444 0%,#222 100%);
  color:#ddd;
  border-top:2px solid #111;
}

body.dark-mode #sub-header a:hover {
  background: linear-gradient(to bottom,#777 0%,#444 100%);
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="main-header">
  <img src="https://raw.githubusercontent.com/ayytrix/ventest1/refs/heads/main/venux.png" alt="Venux">
  <div class="auth-buttons" id="authButtons"></div>
</div>

<!-- NAV -->
<div id="sub-header">
  <span>|</span>
  <a href="Home">Home</a><span>|</span>
  <a href="Games">Games</a><span>|</span>
  <a href="Catalog">Catalog</a><span>|</span>
  <a href="Users">Users</a><span>|</span>
  <a href="Forums">Forum</a><span>|</span>
  <a href="Clans">Clans</a><span>|</span>
  <a href="Help">Help</a><span>|</span>
  <a href="Downloads">Downloads</a><span>|</span>
  <a href="Create">Create</a><span>|</span>
  <a href="Settings">Settings</a><span>|</span>
</div>

<!-- NOTICE -->
<div id="notice">Loading...</div>

<!-- CONTENT -->
<div id="page-content">
  <div class="settings-box">
    <div class="setting-title">Settings</div>

    <div class="setting-row">
      <div>
        <b>Normal Theme</b><br>
        Default Venux blue style
      </div>
      <button class="button normal-btn" id="normalBtn">Enable</button>
    </div>

    <div class="setting-row">
      <div>
        <b>2011 OBC Dark Theme</b><br>
        Classic Roblox-style dark gradients
      </div>
      <button class="button dark-btn" id="darkBtn">Enable</button>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div id="footer">© 2026, Venux — All rights reserved</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPmJ-QYXZ41gx-4PjCpUPuw7DLnDq0JFg",
  authDomain: "venux1.firebaseapp.com",
  projectId: "venux1",
  storageBucket: "venux1.appspot.com",
  messagingSenderId: "231055963335",
  appId: "1:231055963335:web:34c2f52fca2191b3d0bae2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* NOTICE */
fetch("https://raw.githubusercontent.com/ayytrix/ventest1/refs/heads/main/anc")
.then(r => r.text())
.then(t => document.getElementById("notice").textContent = t)
.catch(() => document.getElementById("notice").textContent = "Welcome!");

/* THEME SYSTEM */
function applyTheme() {
  const theme = localStorage.getItem("theme");

  if (theme === "dark") {
    document.body.classList.add("dark-mode");
  } else {
    document.body.classList.remove("dark-mode");
  }
}

applyTheme();

document.getElementById("normalBtn").onclick = () => {
  localStorage.setItem("theme","normal");
  applyTheme();
};

document.getElementById("darkBtn").onclick = () => {
  localStorage.setItem("theme","dark");
  applyTheme();
};

/* AUTH */
onAuthStateChanged(auth, user => {
  if(!user){
    window.location.href = "Login.html";
    return;
  }

  document.getElementById("authButtons").innerHTML =
    `<span>Logged in</span>`;
});
</script>

</body>
</html>
